name: ai-presents-app-ios

options:
  bundleIdPrefix: com.hendrikgrueger
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  developmentLanguage: de
  knownRegions:
    - de
    - en
    - es
    - fr
    - Base

targets:
  aiPresentsApp:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
    sources:
      - path: Sources/aiPresentsApp
    resources:
      - path: App/InfoPlist.xcstrings
      - path: Sources/aiPresentsApp/Resources/PrivacyInfo.xcprivacy
      - path: Sources/aiPresentsApp/Resources/DemoPhotos
    info:
      path: App/Info.plist
      properties:
        # Home screen name — ASO-optimiert, lokalisiert in InfoPlist.xcstrings (DE/EN/FR/ES)
        # App Store name is set in App Store Connect, this is the icon label on the home screen.
        CFBundleDisplayName: "Geschenke AI"
        CFBundleShortVersionString: "1.0.3"
        CFBundleVersion: "135"
        # App only uses HTTPS (TLS) which is exempt encryption per Apple guidelines.
        # Required to skip US export compliance questionnaire on every upload.
        ITSAppUsesNonExemptEncryption: false
        AIProxySecret: "$(AI_PROXY_SECRET)"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSContactsUsageDescription: "Diese App benötigt Zugriff auf deine Kontakte, um Geburtstage von Freunden und Familie zu importieren."
        NSUserNotificationsUsageDescription: "Diese App möchte dich an Geburtstage erinnern, damit du pünktlich Geschenke vorbereiten kannst."
        NSUbiquitousContainersUsageDescription: "Diese App nutzt iCloud, um deine Daten zwischen deinen Apple-Geräten zu synchronisieren."
        NSMicrophoneUsageDescription: "Der KI-Assistent nutzt das Mikrofon für die Spracheingabe, damit du Geschenkideen und Fragen per Stimme eingeben kannst."
        NSSpeechRecognitionUsageDescription: "Die Spracherkennung wird für die Spracheingabe im KI-Assistenten verwendet. Die Erkennung erfolgt bevorzugt auf dem Gerät."
        NSFaceIDUsageDescription: "Face ID schützt deine Geschenkideen, damit niemand sie versehentlich sieht."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - aipresents
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: "Default Configuration"
    configFiles:
      Debug: App/Secrets.xcconfig
      Release: App/Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hendrikgrueger.birthdays-presents-ai
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: "CU87QNNB3N"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/aiPresentsApp.entitlements
    dependencies:
      - target: BirthdayWidgetExtension
        embed: true

  BirthdayWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/BirthdayWidget
    info:
      path: Sources/BirthdayWidget/Info.plist
      properties:
        CFBundleDisplayName: "Geburtstage"
        CFBundleShortVersionString: "1.0.3"
        CFBundleVersion: "135"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hendrikgrueger.birthdays-presents-ai.widget
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: "CU87QNNB3N"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        SKIP_INSTALL: "YES"
        CODE_SIGN_ENTITLEMENTS: Sources/BirthdayWidget/BirthdayWidget.entitlements

  aiPresentsAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/aiPresentsAppTests
    dependencies:
      - target: aiPresentsApp
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/aiPresentsApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/aiPresentsApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
