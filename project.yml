name: ai-presents-app-ios

options:
  bundleIdPrefix: com.hendrikgrueger
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  developmentLanguage: de
  knownRegions:
    - de
    - en
    - Base

targets:
  aiPresentsApp:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/aiPresentsApp
    resources:
      - path: App/InfoPlist.xcstrings
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: "AI Präsente"
        CFBundleShortVersionString: "0.8.1"
        CFBundleVersion: "13"
        AIProxySecret: "$(AI_PROXY_SECRET)"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSContactsUsageDescription: "Diese App benötigt Zugriff auf deine Kontakte, um Geburtstage von Freunden und Familie zu importieren."
        NSUserNotificationsUsageDescription: "Diese App möchte dich an Geburtstage erinnern, damit du pünktlich Geschenke vorbereiten kannst."
        NSUbiquitousContainersUsageDescription: "Diese App nutzt iCloud, um deine Daten zwischen deinen Apple-Geräten zu synchronisieren."
        NSMicrophoneUsageDescription: "Der KI-Assistent nutzt das Mikrofon für die Spracheingabe, damit du Geschenkideen und Fragen per Stimme eingeben kannst."
        NSSpeechRecognitionUsageDescription: "Die Spracherkennung wird für die Spracheingabe im KI-Assistenten verwendet. Die Erkennung erfolgt bevorzugt auf dem Gerät."
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - aipresents
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: "Default Configuration"
    configFiles:
      Debug: App/Secrets.xcconfig
      Release: App/Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hendrikgrueger.ai-presents
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: "7ZR37VL5PV"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/aiPresentsApp.entitlements
    dependencies:
      - target: BirthdayWidgetExtension
        embed: true

  BirthdayWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/BirthdayWidget
    info:
      path: Sources/BirthdayWidget/Info.plist
      properties:
        CFBundleDisplayName: "Geburtstage"
        CFBundleShortVersionString: "0.8.1"
        CFBundleVersion: "13"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hendrikgrueger.ai-presents.widget
        SWIFT_VERSION: "6.0"
        DEVELOPMENT_TEAM: "7ZR37VL5PV"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "YES"
        CODE_SIGNING_ALLOWED: "YES"
        SKIP_INSTALL: "YES"
        CODE_SIGN_ENTITLEMENTS: Sources/BirthdayWidget/BirthdayWidget.entitlements

  aiPresentsAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Tests/aiPresentsAppTests
    dependencies:
      - target: aiPresentsApp
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/aiPresentsApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/aiPresentsApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
