name: ai-presents-app-ios

options:
  bundleIdPrefix: com.harryhirsch1878
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

targets:
  aiPresentsApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/aiPresentsApp
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: "AI Präsente"
        CFBundleShortVersionString: "0.2.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSContactsUsageDescription: "Diese App benötigt Zugriff auf deine Kontakte, um Geburtstage von Freunden und Familie zu importieren."
        NSUserNotificationsUsageDescription: "Diese App möchte dich an Geburtstage erinnern, damit du pünktlich Geschenke vorbereiten kannst."
        NSUbiquitousContainersUsageDescription: "Diese App nutzt iCloud, um deine Daten zwischen deinen Apple-Geräten zu synchronisieren."
        OpenRouterAPIKey: "$(OPENROUTER_API_KEY)"
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: "Default Configuration"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.harryhirsch1878.ai-presents-app
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"

  aiPresentsAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/aiPresentsAppTests
    dependencies:
      - target: aiPresentsApp
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/aiPresentsApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/aiPresentsApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
