name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build & Test
    runs-on: macos-15

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Create Secrets.xcconfig
      run: |
        echo "// CI dummy" > App/Secrets.xcconfig
        echo "AI_PROXY_SECRET = " >> App/Secrets.xcconfig

    - name: Find available simulator
      id: simulator
      run: |
        # Finde den ersten verfügbaren iPhone-Simulator
        DEVICE=$(xcrun simctl list devices available -j | python3 -c "
        import json, sys
        data = json.load(sys.stdin)
        for runtime, devices in data.get('devices', {}).items():
            if 'iOS' not in runtime:
                continue
            for d in devices:
                if 'iPhone' in d['name'] and 'Pro' in d['name']:
                    print(d['name']); sys.exit(0)
        # Fallback: erster iPhone
        for runtime, devices in data.get('devices', {}).items():
            if 'iOS' not in runtime:
                continue
            for d in devices:
                if 'iPhone' in d['name']:
                    print(d['name']); sys.exit(0)
        ")
        echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
        echo "Verwende Simulator: $DEVICE"

    - name: Build
      run: |
        xcodebuild -project ai-presents-app-ios.xcodeproj \
          -scheme aiPresentsApp \
          -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}" \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO \
          build

    - name: Run tests
      run: |
        xcodebuild -project ai-presents-app-ios.xcodeproj \
          -scheme aiPresentsApp \
          -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}" \
          -configuration Debug \
          CODE_SIGNING_ALLOWED=NO \
          test
      continue-on-error: true

  lint:
    name: SwiftLint
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install SwiftLint
      run: brew install swiftlint

    - name: Run SwiftLint
      run: swiftlint lint --reporter github-actions-logging
      continue-on-error: true
